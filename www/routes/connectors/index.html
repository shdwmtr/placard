<!doctype html>
<html lang="en">

<head>

<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <a href="/">
                    <span class="mark"><img src="/favicon.svg" alt="" width="20" height="20" /></span>
                    <span class="sep">/</span>
                    Placard </a><span class="sep">/</span>Connectors
            </div>

                <div class="search-wrap">
                    <input id="search" type="text" placeholder="Search presets..." autocomplete="off" />

                    </svg>
                </button>

        </div>

        <main class="main" id="content">
            <div class="placeholder-message">
