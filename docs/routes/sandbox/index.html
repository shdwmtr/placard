<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Placard • Playground</title>
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="stylesheet" href="/assets/theme.css" />
        <link rel="stylesheet" href="/sandbox/style.css" />
    <body>
        <header class="topbar">
            <div class="topbar-inner">
                <div class="brand">
                    <a href="/">
                        <span class="mark"
                            ><img
                                src="/favicon.svg"
                                alt=""
                                width="20"
                                height="20"
                        /></span>
                        <span class="sep">/</span>
                        Placard </a
                    ><span class="sep">/</span>Sandbox Mode
                </div>
                <div class="topbar-actions">
                    <label class="ctrl">
                        <span>Width</span>
                        <input
                            id="width"
                            type="number"
                            min="1"
                            max="2000"
                            value="400"
                        />
                    </label>
                    <label class="ctrl">
                        <select id="format">
                            <option value="webp" selected>WebP</option>
                            <option value="png">PNG</option>
                        </select>
                    </label>
                    <button type="button" id="copy-url" class="btn">
                        Copy render URL
                    </button>
                </div>
            </div>
        </header>
        <div class="editor-layout">
            <section class="pane code-pane">
                <div class="editor-wrap" id="editor-container"></div>
                <div class="console-panel" id="console-panel">
                    <div class="console-header" id="console-toggle">
                        <span class="console-icon" id="console-icon"></span>
                        <span
                            class="console-summary"
                            id="console-summary"
                        ></span>
                        <span class="console-chevron" id="console-chevron"
                            >&#9662;</span
                        >
                    </div>
                    <div class="console-body" id="console-body"></div>
                </div>
            </section>
            <section class="pane preview-pane">
                <div class="pane-label">
                    <span>Preview</span>
                    <div class="preview-controls">
                        <label class="ctrl border-ctrl">
                            <span>Border</span>
                            <input
                                id="border-width"
                                type="range"
                                min="0"
                                max="20"
                                value="1"
                            />
                            <span id="border-width-value">1px</span>
                        </label>
                        <input
                            id="border-color"
                            type="color"
                            value="#262626"
                            title="Border color"
                        />
                        <div class="preview-zoom">
                            <span id="zoom-level">100%</span>
                            <button
                                type="button"
                                id="zoom-reset"
                                class="btn btn-small"
                            >
                                Reset
                            </button>
                        </div>
                    </div>
                </div>
                <div class="preview-split">
                    <div class="preview-wrap" id="preview-viewport">
                        <div class="preview-stage" id="preview-stage">
                            <img
                                id="preview-img"
                                class="preview-img"
                                alt="rendered preview"
                                draggable="false"
                            />
                        </div>
                        <div id="preview-status" class="preview-status"></div>
                    </div>
                    <div class="split-divider"></div>
                    <div class="browser-pane">
                        <div class="pane-label browser-label">
                            <span>Browser render</span>
                            <span
                                id="browser-width-readout"
                                class="dim-readout"
                            ></span>
                        </div>
                        <div class="browser-frame-wrap">
                            <iframe
                                id="browser-frame"
                                class="browser-frame"
                                title="browser-rendered comparison"
                            ></iframe>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        <script src="/sandbox/editor.js"></script>
        <script src="/sandbox/script.js"></script>
    </body>
</html>
